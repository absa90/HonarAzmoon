    <style>
        :root {
            --primary: #1e3a8a;
            --primary-dark: #172554;
            --accent: #b45309;
            --accent-light: #fef3c7;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --success: #15803d;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; font-family: Tahoma, Geneva, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 800px; border-top: 8px solid var(--primary); margin-bottom: 15px; }
        h2, h3 { text-align: center; color: var(--primary); margin-top: 0; }
        .subtitle { text-align: center; color: var(--accent); font-size: 14px; margin-top: -10px; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #334155; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); outline: none; background: #f8fafc; }
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; background: var(--primary); color: white; flex: 1; min-width: 150px; }
        button:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-secondary { background: #64748b; }
        .btn-secondary:hover { background: #475569; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #166534; }
        .btn-warning { background: #d97706; color: white; }
        .btn-warning:hover { background: #b45309; }
        .status-bar { display: flex; justify-content: space-between; background: #f1f5f9; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: bold; }
        #timer { color: var(--danger); font-size: 15px; }
        .option { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; margin: 12px 0; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; font-size: 15px; }
        .option:hover { border-color: #cbd5e1; background: #f8fafc; }
        .option.selected { background: #eff6ff; border-color: var(--primary); font-weight: bold; }
        .option input[type="radio"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        #nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 20px 0; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; }
        .navbtn { width: 35px; height: 35px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .current { background: var(--accent); color: white; transform: scale(1.1); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .answered { background: var(--primary); color: white; }
        .unanswered { background: #e2e8f0; color: #475569; }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container svg { width: 70px; fill: var(--primary); }
    </style>
</head>
<body>

    <div class="box" id="formBox">
        <div class="logo-container">
            <svg viewBox="0 0 24 24"><path d="M12 24c6.627 0 12-5.373 12-12S18.627 0 12 0 0 5.373 0 12s5.373 12 12 12zm1-21.84c3.82.47 6.87 3.52 7.34 7.34H17.22c-.42-1.93-1.95-3.46-3.88-3.88V2.16zM11 2.16v4.1c-1.93.42-3.46 1.95-3.88 3.88H4.16c.47-3.82 3.52-6.87 7.34-7.34zM4.16 13h2.96c.42 1.93 1.95 3.46 3.88 3.88v4.1c-3.82-.47-6.87-3.52-7.34-7.34zm13.06 0h2.96c-.47 3.82-3.52 6.87-7.34 7.34v-4.1c1.93-.42 3.46-1.95 3.88-3.88z"/></svg>
        </div>
        <h2>سامانه الکترونیکی هنرآزمون</h2>
        <div class="subtitle">ویژه برگزاری آزمون‌های مهارتی هنرستان تلاش</div>
        
        <label>نام و نام خانوادگی هنرجو *</label>
        <input id="name" type="text" placeholder="مثال: رضا احمدی" autocomplete="off">
        <label>نام پدر</label>
        <input id="father" type="text" placeholder="اختیاری" autocomplete="off">
        <label>کد ملی</label>
        <input id="nid" type="text" placeholder="اختیاری" autocomplete="off">

        <button style="margin-top:25px;" onclick="startExam()">ادامه و انتخاب فایل</button>
    </div>

    <div class="box" id="fileBox" style="display:none">
        <h3>انتخاب فایل بانک سوالات آزمون</h3>
        <div class="subtitle">لطفاً فایل اکسل استاندارد مربوطه را بارگذاری کنید</div>
        <input type="file" id="fileInput" accept=".xlsx">
        <div class="btn-group">
            <button class="btn-secondary" onclick="backToForm()">بازگشت</button>
            <button onclick="loadExam()">شروع فرایند آزمون</button>
        </div>
    </div>

    <div class="box" id="examBox" style="display:none">
        <div class="status-bar">
            <div id="examTitleInfo">آزمون: ---</div>
            <div id="timer">زمان: --:--</div>
        </div>
        <h3 id="title" style="text-align:right; color: var(--text); font-size:16px;"></h3>
        <div id="qbox" style="margin-bottom:20px;"></div>
        <div id="nav"></div>
        <div class="btn-group">
            <button class="btn-secondary" onclick="prev()">سوال قبلی</button>
            <button onclick="next()">سوال بعدی</button>
            <button class="btn-success" onclick="finish(false)">پایان و ثبت آزمون</button>
        </div>
    </div>

    <div class="box" id="resultBox" style="display:none; text-align:center;"></div>

<script>
let q = [], a = [], i = 0, time = 0, timer;
let info = {};

function startExam(){
    let nameVal = document.getElementById("name").value.trim();
    if(!nameVal){ alert("وارد کردن نام و نام خانوادگی الزامی است."); return; }
    document.getElementById("formBox").style.display = "none";
    document.getElementById("fileBox").style.display = "block";
}

function backToForm() {
    document.getElementById("fileBox").style.display = "none";
    document.getElementById("formBox").style.display = "block";
}

function loadExam(){
    let f = document.getElementById("fileInput").files[0];
    if(!f) { alert("لطفاً فایل اکسل آزمون را انتخاب کنید."); return; }
    let r = new FileReader();
    r.onload = function(e){
        try {
            let wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            let sh = wb.Sheets[wb.SheetNames[0]];
            let d = XLSX.utils.sheet_to_json(sh, {header:1});
            parse(d);
        } catch(err) { alert("خطا در خواندن فایل اکسل. مطمئن شوید فایل خراب نیست."); }
    };
    r.readAsArrayBuffer(f);
}

function parse(d){
    if(d.length < 2) { alert("فایل اکسل تهی است یا دیتای استاندارد ندارد."); return; }
    let h = d[0];
    info = {
        exam: h[7] || "آزمون مهارتی",
        field: h[8] || "رشته مهارتی کاردانش",
        grade: h[9] || "---",
        date: h[10] || "---",
        time: parseInt(h[11]) || 60
    };
    q = [];
    for(let k = 1; k < d.length; k++){
        let r = d[k];
        if(!r || !r[1]) continue;
        q.push({
            q: r[1], A: r[2] || "---", B: r[3] || "---", C: r[4] || "---", D: r[5] || "---", correct: String(r[6]).trim().toUpperCase()
        });
    }
    if(q.length === 0) { alert("هیچ سوال معتبری یافت نشد."); return; }
    time = info.time * 60;
    document.getElementById("examTitleInfo").innerText = "آزمون: " + info.exam;
    document.getElementById("fileBox").style.display = "none";
    document.getElementById("examBox").style.display = "block";
    startTimer();
    show();
}

function startTimer(){
    timer = setInterval(() => {
        let m = Math.floor(time / 60); let s = time % 60;
        document.getElementById("timer").innerText = "زمان: " + m + ":" + String(s).padStart(2, '0');
        time--; if(time < 0) finish(true);
    }, 1000);
}

function show(){
    let x = q[i];
    document.getElementById("title").innerText = "سوال " + (i + 1) + " از " + q.length;
    document.getElementById("qbox").innerHTML = `
        <div style="font-size:16px; font-weight:bold; margin-bottom:15px; line-height:1.6;">${x.q}</div>
        <div class="option ${a[i]=='A'?'selected':''}" onclick="sel('A')"><input type="radio" name="q_opt" ${a[i]=='A'?'checked':''}> <b>الف)</b> ${x.A}</div>
        <div class="option ${a[i]=='B'?'selected':''}" onclick="sel('B')"><input type="radio" name="q_opt" ${a[i]=='B'?'checked':''}> <b>ب)</b> ${x.B}</div>
        <div class="option ${a[i]=='C'?'selected':''}" onclick="sel('C')"><input type="radio" name="q_opt" ${a[i]=='C'?'checked':''}> <b>ج)</b> ${x.C}</div>
        <div class="option ${a[i]=='D'?'selected':''}" onclick="sel('D')"><input type="radio" name="q_opt" ${a[i]=='D'?'checked':''}> <b>د)</b> ${x.D}</div>
    `;
    drawNav();
}

function drawNav(){
    let h = "";
    for(let k = 0; k < q.length; k++){
        let c = "unanswered"; if(a[k]) c = "answered"; if(k == i) c = "current";
        h += `<button class="navbtn ${c}" onclick="go(${k})">${k + 1}</button>`;
    }
    document.getElementById("nav").innerHTML = h;
}

function go(n) { i = n; show(); }
function sel(v) { a[i] = v; show(); }
function next() { if(i < q.length - 1) { i++; show(); } }
function prev() { if(i > 0) { i--; show(); } }

function finish(auto = false){
    let miss = [];
    for(let k = 0; k < q.length; k++){ if(!a[k]) miss.push(k + 1); }
    if(!auto && miss.length){ if(!confirm("شما به سوالات شماره [" + miss.join(", ") + "] پاسخ نداده‌اید. آیا مایل به اتمام آزمون هستید؟")) return; }
    else if(!auto) { if(!confirm("آیا از اتمام و ثبت نهایی آزمون اطمینان دارید؟")) return; }

    clearInterval(timer);
    let correctCount = 0;
    for(let k = 0; k < q.length; k++){ if(a[k] && a[k] === q[k].correct) correctCount++; }
    let wrongCount = q.length - correctCount;
    let score100 = ((correctCount / q.length) * 100).toFixed(1);
    let score20 = ((correctCount / q.length) * 20).toFixed(1);
    let passStatus = parseFloat(score100) >= 50 ? "قبول" : "مردود";

    let leftTableRows = "", rightTableRows = "";
    for(let k = 0; k < 50; k++){
        let rowHtml = "";
        if(k < q.length) {
            let userAns = a[k], correctAns = q[k].correct, isCorrect = userAns === correctAns;
            let cA='&nbsp;', cB='&nbsp;', cC='&nbsp;', cD='&nbsp;', statusSign='-';
            if(userAns) {
                if(isCorrect) {
                    if(userAns=='A') cA='✔'; if(userAns=='B') cB='✔'; if(userAns=='C') cC='✔'; if(userAns=='D') cD='✔';
                    statusSign = '✔ صحیح';
                } else {
                    if(userAns=='A') cA='✖'; if(userAns=='B') cB='✖'; if(userAns=='C') cC='✖'; if(userAns=='D') cD='✖';
                    if(correctAns=='A') cA='◯'; if(correctAns=='B') cB='◯'; if(correctAns=='C') cC='◯'; if(correctAns=='D') cD='◯';
                    statusSign = '✖ غلط';
                }
            } else {
                if(correctAns=='A') cA='◯'; if(correctAns=='B') cB='◯'; if(correctAns=='C') cC='◯'; if(correctAns=='D') cD='◯';
                statusSign = '✖ نزده';
            }
            rowHtml = `<tr><td class="q-num">${k+1}</td><td>${cA}</td><td>${cB}</td><td>${cC}</td><td>${cD}</td><td style="font-size:8px; font-weight:bold;">${statusSign}</td></tr>`;
        } else { rowHtml = `<tr><td class="q-num">${k+1}</td><td></td><td></td><td></td><td></td><td></td></tr>`; }
        if(k < 25) leftTableRows += rowHtml; else rightTableRows += rowHtml;
    }

    let studentName = document.getElementById("name").value.trim();
    let fatherName = document.getElementById("father").value.trim() || "....................";
    let nationalId = document.getElementById("nid").value.trim() || "....................";

    let resHTML = `<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><title>کارنامه - ${studentName}</title><style>@page { size: A5 landscape; margin: 4mm; } body { font-family: 'Tahoma', sans-serif; font-size: 10px; margin: 0; padding: 2mm; background-color: #fff; color: #000; } .header { text-align: center; margin-bottom: 6px; border-bottom: 2px solid #000; padding-bottom: 4px; } .header h1 { font-size: 12px; margin: 0 0 2px 0; } .header h2 { font-size: 10px; margin: 0; font-weight: normal; } .main-container { display: flex; justify-content: space-between; height: 112mm; } .table-column { width: 39%; } .info-column { width: 20%; border-right: 2px solid #000; padding-right: 8px; display: flex; flex-direction: column; justify-content: space-between; } table { width: 100%; border-collapse: collapse; text-align: center; } th, td { border: 1px solid #000; padding: 2px 1px; font-size: 9.5px; height: 4mm; } th { background-color: #e6e6e6; font-weight: bold; } .q-num { font-weight: bold; background-color: #f0f0f0; width: 18px; } .info-label { font-weight: bold; display: block; margin-bottom: 1px; } .info-value { background-color: #f5f5f5; padding: 2px 4px; display: block; margin-bottom: 4px; border-bottom: 1px dashed #000; font-weight: bold; } .score-highlight { font-weight: bold; border: 1px solid #000; background-color: #fafafa; } .signature-space { margin-top: auto; border-top: 1px solid #000; padding-top: 15px; text-align: center; font-weight: bold; }</style></head><body><div class="header"><h1>کارنامه آزمون مهارت: ${info.exam}</h1><h2>اداره کل آموزش و پرورش استان اصفهان | هنرستان کاردانش تلاش مبارکه</h2></div><div class="main-container"><div class="table-column"><table><thead><tr><th class="q-num">ش</th><th>الف</th><th>ب</th><th>ج</th><th>د</th><th>وضعیت</th></tr></thead><tbody>${leftTableRows}</tbody></table></div><div class="table-column"><table><thead><tr><th class="q-num">ش</th><th>الف</th><th>ب</th><th>ج</th><th>د</th><th>وضعیت</th></tr></thead><tbody>${rightTableRows}</tbody></table></div><div class="info-column"><div><span class="info-label">هنرجو:</span><span class="info-value">${studentName}</span><span class="info-label">نام پدر:</span><span class="info-value">${fatherName}</span><span class="info-label">کد ملی:</span><span class="info-value">${nationalId}</span><span class="info-label">پایه/کلاس:</span><span class="info-value">${info.grade}</span><span class="info-label">صحیح / غلط:</span><span class="info-value">${correctCount} / ${wrongCount}</span><span class="info-label">نمره از ۱۰۰:</span><span class="info-value score-highlight">${score100}</span><span class="info-label">نمره از ۲۰:</span><span class="info-value score-highlight">${score20}</span><span class="info-label">نتیجه نهایی:</span><span class="info-value" style="text-align:center;">${passStatus}</span></div><div class="signature-space">امضای هنرآموز</div></div></div></body></html>`;
    window.compiledResultHTML = resHTML;

    let questionsHtml = "";
    for(let k = 0; k < q.length; k++) {
        questionsHtml += `<div class="question-block"><div class="question-text"><b>سوال ${k+1}:</b> ${q[k].q}</div><div class="options-container"><div class="option-item">الف) ${q[k].A}</div><div class="option-item">ب) ${q[k].B}</div><div class="option-item">ج) ${q[k].C}</div><div class="option-item">د) ${q[k].D}</div></div></div>`;
    }

    let examBookletHTML = `<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><title>دفترچه سوالات - ${info.exam}</title><style>@page { size: A4 portrait; margin: 10mm; } body { font-family: 'Tahoma', sans-serif; font-size: 11px; margin: 0; padding: 0; color: #000; line-height: 1.6; } .exam-header { border: 2px solid #000; padding: 10px; margin-bottom: 20px; } .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; padding-bottom: 8px; } .header-title { text-align: center; flex: 1; } .header-title h1 { font-size: 14px; margin: 0 0 5px 0; } .header-title h2 { font-size: 11px; margin: 0; font-weight: normal; } .header-meta { font-size: 10px; text-align: right; line-height: 1.5; } .header-bottom { display: flex; justify-content: space-between; padding-top: 8px; font-weight: bold; font-size: 11px; } .question-block { border-bottom: 1px dashed #ccc; padding: 12px 0; page-break-inside: avoid; } .question-text { font-size: 12px; margin-bottom: 8px; text-align: justify; } .options-container { display: flex; flex-wrap: wrap; gap: 10px; } .option-item { width: 48%; min-width: 200px; font-size: 11.5px; padding-right: 15px; } .footer-exam { margin-top: 30px; border-top: 2px solid #000; padding-top: 15px; display: flex; justify-content: space-between; font-weight: bold; page-break-inside: avoid; }</style></head><body><div class="exam-header"><div class="header-top"><div class="header-meta"><div>وزارت آموزش و پرورش</div><div>اداره کل آموزش و پرورش استان اصفهان</div></div><div class="header-title"><h1>دفترچه رسمی سوالات آزمون کتبی مهارتی</h1><h2>${info.field}</h2></div><div class="header-meta" style="text-align: left;"><div>نام آزمون: ${info.exam}</div><div>تاریخ: ${info.date}</div></div></div><div class="header-bottom"><div>هنرجو: ${studentName}</div><div>نام پدر: ${fatherName}</div><div>کد ملی: ${nationalId}</div></div></div><div class="questions-list">${questionsHtml}</div></body></html>`;
    window.compiledQuestionsHTML = examBookletHTML;

    let uniqueTime = new Date().toTimeString().split(' ')[0].replace(/:/g, '-');
    triggerDownload(window.compiledResultHTML, "Karnameh_" + studentName.replace(/\s+/g, '_') + "_" + uniqueTime + ".html");

    document.getElementById("examBox").style.display = "none";
    let resBox = document.getElementById("resultBox"); resBox.style.display = "block";
    resBox.innerHTML = `
        <h2 style="color:var(--success); margin-bottom:10px;">آزمون با موفقیت ثبت شد</h2>
        <p>هنرجوی گرامی <b>${studentName}</b>، آزمون شما به پایان رسید.</p>
        <div class="btn-group" style="justify-content: center; max-width: 500px; margin: 0 auto;">
            <button class="btn-success" onclick="downloadResultFile('${studentName}')">📥 دانلود مجدد کارنامه</button>
            <button class="btn-warning" onclick="downloadQuestionsFile('${studentName}')">📄 دانلود دفترچه سوالات</button>
        </div>
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e2e8f0;">
        <button class="btn-secondary" style="width:auto; padding: 10px 20px;" onclick="location.reload()">🔄 سیستم آماده برای نفر بعدی</button>
    `;
}

function triggerDownload(content, filename) {
    let blob = new Blob([content], {type:'text/html;charset=utf-8'});
    let aLink = document.createElement("a"); aLink.href = URL.createObjectURL(blob); aLink.download = filename; aLink.click();
}
function downloadResultFile(name) { let uniqueTime = new Date().toTimeString().split(' ')[0].replace(/:/g, '-'); triggerDownload(window.compiledResultHTML, "Karnameh_" + name.replace(/\s+/g, '_') + "_" + uniqueTime + ".html"); }
function downloadQuestionsFile(name) { triggerDownload(window.compiledQuestionsHTML, "Exam_Booklet_" + info.exam.replace(/\s+/g, '_') + ".html"); }
</script>
</body>
</html>
