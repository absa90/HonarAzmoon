<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>هنرآزمون</title>

  <style>
    body {
      font-family: Tahoma;
      background: #f2f6ff;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #15803d;
    }

    /* گزینه‌ها */
    .option {
      display: flex;
      align-items: center;
      padding: 12px;
      margin: 10px 0;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      background: #e2e8f0;
    }

    .option.selected {
      background: #bfdbfe;
      border: 2px solid #2563eb;
    }

    /* دایره انتخاب */
    .radio {
      width: 20px;
      height: 20px;
      border: 2px solid #333;
      border-radius: 50%;
      margin-left: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .radio.checked::after {
      content: "";
      width: 10px;
      height: 10px;
      background: #2563eb;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<header>
  <h2>هنرآزمون</h2>
  <p>سامانه آزمون‌سازی مهارتی</p>
</header>

<div class="container">

  <div class="box">
    <h3>انتخاب فایل آزمون</h3>
    <input type="file" id="fileInput" accept=".xlsx">
    <br><br>
    <button onclick="loadFile()">شروع آزمون</button>
  </div>

  <div class="box" id="examBox" style="display:none;">
    <h3 id="qTitle">سوال</h3>
    <div id="question"></div>

    <br>

    <button onclick="prevQuestion()">قبلی</button>
    <button onclick="nextQuestion()">بعدی</button>
  </div>

</div>

<!-- کتابخانه Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
  let questions = [];
  let current = 0;
  let answers = [];

  function loadFile() {
    const input = document.getElementById('fileInput');
    const file = input.files[0];

    if (!file) {
      alert("لطفاً فایل Excel را انتخاب کنید");
      return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });

      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];

      const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

      parseQuestions(json);
    };

    reader.readAsArrayBuffer(file);
  }

  function parseQuestions(data) {
    questions = [];

    for (let i = 1; i < data.length; i++) {
      let row = data[i];

      if (!row || !row[0]) continue;

      questions.push({
        id: row[0],
        skill: row[1],
        q: row[2],
        A: row[3],
        B: row[4],
        C: row[5],
        D: row[6],
        correct: row[7]
      });
    }

    if (questions.length === 0) {
      alert("سوالی پیدا نشد");
      return;
    }

    current = 0;
    answers = [];

    document.getElementById("examBox").style.display = "block";
    showQuestion();
  }

  function showQuestion() {
    let q = questions[current];

    document.getElementById("qTitle").innerText =
      "سوال " + (current + 1) + " از " + questions.length;

    document.getElementById("question").innerHTML = `
      <p><b>${q.q}</b></p>

      <div class="option" id="optA" onclick="selectAnswer('A')">
        <div class="radio" id="radioA"></div>
        ${q.A}
      </div>

      <div class="option" id="optB" onclick="selectAnswer('B')">
        <div class="radio" id="radioB"></div>
        ${q.B}
      </div>

      <div class="option" id="optC" onclick="selectAnswer('C')">
        <div class="radio" id="radioC"></div>
        ${q.C}
      </div>

      <div class="option" id="optD" onclick="selectAnswer('D')">
        <div class="radio" id="radioD"></div>
        ${q.D}
      </div>
    `;

    updateUI();
  }

  function selectAnswer(ans) {
    answers[current] = ans;
    updateUI();
  }

  function updateUI() {
    ["A","B","C","D"].forEach(opt => {
      const box = document.getElementById("opt"+opt);
      const radio = document.getElementById("radio"+opt);

      if (box) box.classList.remove("selected");
      if (radio) radio.classList.remove("checked");
    });

    let selected = answers[current];

    if (selected) {
      document.getElementById("opt"+selected).classList.add("selected");
      document.getElementById("radio"+selected).classList.add("checked");
    }
  }

  function nextQuestion() {
    if (current < questions.length - 1) {
      current++;
      showQuestion();
    } else {
      alert("آزمون تمام شد (نسخه اولیه)");
    }
  }

  function prevQuestion() {
    if (current > 0) {
      current--;
      showQuestion();
    }
  }
</script>

</body>
</html>
