<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هنرآزمون V1.0</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:tahoma;
background:#f2f6ff;
margin:0;
padding:20px;
}

.box{
background:#fff;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

.option{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
margin:8px 0;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.option.selected{
background:#dbeafe;
border-color:#2563eb;
}

#nav{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-top:15px;
}

.navbtn{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.current{background:#2563eb;color:white;}
.answered{background:#16a34a;color:white;}
.unanswered{background:#e5e7eb;}
</style>
</head>

<body>

<div class="box" id="formBox">
<h2>هنرآزمون</h2>

<label>نام و نام خانوادگی *</label>
<input id="name">

<label>نام پدر</label>
<input id="father">

<label>کد ملی</label>
<input id="nid">

<button onclick="startExam()">ادامه</button>
</div>

<div class="box" id="fileBox" style="display:none">
<h3>انتخاب فایل اکسل آزمون</h3>
<input type="file" id="fileInput" accept=".xlsx">
<button onclick="loadExam()">شروع آزمون</button>
</div>

<div class="box" id="examBox" style="display:none">

<div id="timer">--</div>
<h3 id="title"></h3>

<div id="qbox"></div>
<div id="nav"></div>

<button onclick="prev()">قبلی</button>
<button onclick="next()">بعدی</button>
<button onclick="finish()">پایان آزمون</button>

</div>

<div class="box" id="resultBox" style="display:none"></div>

<script>

let q=[],a=[],i=0,time=0,timer;
let info={};

function startExam(){
if(!document.getElementById("name").value.trim()){
alert("نام الزامی است");
return;
}
formBox.style.display="none";
fileBox.style.display="block";
}

function loadExam(){
let f=fileInput.files[0];
if(!f)return;

let r=new FileReader();
r.onload=function(e){

let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
let sh=wb.Sheets[wb.SheetNames[0]];
let d=XLSX.utils.sheet_to_json(sh,{header:1});

parse(d);
};

r.readAsArrayBuffer(f);
}

function parse(d){

let h=d[0];

info={
exam:h[7],
field:h[8],
grade:h[9],
date:h[10],
time:h[11]
};

if(!info.time){
alert("مدت زمان آزمون مشخص نشده");
return;
}

q=[];

for(let r of d){
if(!r || !r[0]) continue;

q.push({
q:r[1],
A:r[2],
B:r[3],
C:r[4],
D:r[5],
correct:String(r[6]).trim()
});
}

time=info.time*60;

fileBox.style.display="none";
examBox.style.display="block";

startTimer();
show();
}

function startTimer(){
timer=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
"زمان: "+m+":"+String(s).padStart(2,'0');

time--;

if(time<0) finish(true);

},1000);
}

function show(){

let x=q[i];

title.innerText="سوال "+(i+1)+" از "+q.length;

qbox.innerHTML=`
<div><b>${x.q}</b></div>

<div class="option ${a[i]=='A'?'selected':''}" onclick="sel('A')"><input type="radio" ${a[i]=='A'?'checked':''}> ${x.A}</div>
<div class="option ${a[i]=='B'?'selected':''}" onclick="sel('B')"><input type="radio" ${a[i]=='B'?'checked':''}> ${x.B}</div>
<div class="option ${a[i]=='C'?'selected':''}" onclick="sel('C')"><input type="radio" ${a[i]=='C'?'checked':''}> ${x.C}</div>
<div class="option ${a[i]=='D'?'selected':''}" onclick="sel('D')"><input type="radio" ${a[i]=='D'?'checked':''}> ${x.D}</div>
`;

drawNav();
}

function drawNav(){
let h="";
for(let k=0;k<q.length;k++){
let c="unanswered";
if(a[k]) c="answered";
if(k==i) c="current";

h+=`<button class="navbtn ${c}" onclick="go(${k})">${k+1}</button>`;
}
nav.innerHTML=h;
}

function go(n){i=n;show();}
function sel(v){a[i]=v;show();}
function next(){if(i<q.length-1){i++;show();}}
function prev(){if(i>0){i--;show();}}

function finish(auto=false){

let miss=[];
for(let k=0;k<q.length;k++){
if(!a[k]) miss.push(k+1);
}

if(!auto && miss.length){
if(!confirm("سوالات بدون پاسخ: "+miss.join(",")+" آیا پایان؟")) return;
}

clearInterval(timer);

let rows="";
let correct=0;

for(let k=0;k<q.length;k++){
let ok=a[k]==q[k].correct;
if(ok) correct++;

rows+=`
<tr>
<td>${k+1}</td>
<td>${a[k]||""}</td>
<td>${q[k].correct}</td>
<td>${ok?"✓":"✗"}</td>
</tr>`;
}

let wrong=q.length-correct;
let score100=(correct/q.length*100).toFixed(2);
let score20=(correct/q.length*20).toFixed(2);

let resHTML=`
<html dir="rtl"><meta charset="utf-8">
<h2>پاسخنامه آزمون</h2>

<p>آزمون: ${info.exam}</p>
<p>رشته: ${info.field}</p>
<p>پایه: ${info.grade}</p>
<p>تاریخ: ${info.date}</p>

<hr>

<p>نام: ${name.value}</p>
<p>نام پدر: ${father.value}</p>
<p>کد ملی: ${nid.value}</p>

<table border="1" cellpadding="5">
<tr><th>سوال</th><th>پاسخ</th><th>صحیح</th><th>نتیجه</th></tr>
${rows}
</table>

<p>صحیح: ${correct}</p>
<p>غلط: ${wrong}</p>
<p>نمره 100: ${score100}</p>
<p>نمره 20: ${score20}</p>
</html>
`;

let blob=new Blob([resHTML],{type:'text/html'});
let aLink=document.createElement("a");
aLink.href=URL.createObjectURL(blob);
aLink.download="Result_"+name.value+".html";
aLink.click();

examBox.style.display="none";
resultBox.style.display="block";

resultBox.innerHTML="<h2>آزمون با موفقیت ثبت شد</h2><p>فایل پاسخنامه دانلود شد</p>";
}

</script>

</body>
</html>
