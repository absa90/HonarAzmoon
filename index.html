<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هنرآزمون</title>

<style>
body{font-family:tahoma;background:#f2f6ff;margin:0;padding:0}

header{
background:#1e3a8a;color:white;
padding:10px;
display:flex;
justify-content:center;
gap:10px;
align-items:center;
}

header img{height:45px}

.container{padding:20px}
.box{background:white;padding:20px;border-radius:10px;margin-top:15px}

input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
background:#16a34a;
color:white;
border:none;
border-radius:5px;
margin:5px;
cursor:pointer;
}

.option{
padding:12px;
margin:10px 0;
background:#f1f5f9;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}

.option.selected{
background:#bfdbfe;
border:2px solid #2563eb;
}

#timer{color:#b91c1c;font-weight:bold;font-size:18px}
</style>
</head>

<body>

<header>
<img src="https://s6.uupload.ir/files/1781891168486_wwcp.png">
<div>
<h3>هنرآزمون</h3>
<small>سیستم آزمون مهارتی</small>
</div>
</header>

<div class="container">

<!-- فرم -->
<div class="box" id="formBox">
<h3>اطلاعات دانش‌آموز</h3>

<input id="name" placeholder="نام و نام خانوادگی *">
<input id="father" placeholder="نام پدر">
<input id="nid" placeholder="کد ملی">
<input id="grade" placeholder="پایه">
<input id="field" placeholder="رشته">

<button onclick="start()">ادامه</button>
</div>

<!-- فایل -->
<div class="box" id="fileBox" style="display:none">
<h3>فایل آزمون</h3>
<input type="file" id="fileInput" accept=".xlsx">
<button onclick="load()">شروع آزمون</button>
</div>

<!-- آزمون -->
<div class="box" id="examBox" style="display:none">

<div id="timer">--</div>
<h3 id="title"></h3>
<div id="qbox"></div>

<button onclick="prev()">قبلی</button>
<button onclick="next()">بعدی</button>
<button onclick="finish()">پایان آزمون</button>

</div>

<!-- نتیجه -->
<div class="box" id="resultBox" style="display:none"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let q=[],a=[],i=0,time=0,timer;

/* جلوگیری از تکرار */
function start(){

if(!name.value){
alert("نام اجباری است");
return;
}

let users=JSON.parse(localStorage.getItem("users")||"{}");

if(users[name.value]){
alert("شما قبلاً در آزمون شرکت کرده‌اید");
return;
}

document.getElementById("formBox").style.display="none";
document.getElementById("fileBox").style.display="block";
}

/* load */
function load(){

let f=fileInput.files[0];
if(!f)return;

let r=new FileReader();

r.onload=function(e){
let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:"array"});
let sh=wb.Sheets[wb.SheetNames[0]];
let j=XLSX.utils.sheet_to_json(sh,{header:1});
parse(j);
}

r.readAsArrayBuffer(f);
}

/* parse */
function parse(d){

q=[];
let examTime=30;

d.forEach(r=>{
if(!r||!r[0]||r.length<8)return;

q.push({
q:r[2],A:r[3],B:r[4],C:r[5],D:r[6],correct:r[7]
});

if(r[8])examTime=r[8];
});

time=examTime*60;
startTimer();

i=0;
a=[];

fileBox.style.display="none";
examBox.style.display="block";

show();
}

/* timer */
function startTimer(){
timer=setInterval(()=>{

let m=Math.floor(time/60);
let s=time%60;

timerDiv.innerText=`زمان: ${m}:${s<10?"0":""}${s}`;

time--;

if(time<0)finish();

},1000);
}

/* show */
function show(){

let x=q[i];

title.innerText=`سوال ${i+1} از ${q.length}`;

qbox.innerHTML=`
<p><b>${x.q}</b></p>

<div class="option" onclick="sel('A')" id="A">${x.A}</div>
<div class="option" onclick="sel('B')" id="B">${x.B}</div>
<div class="option" onclick="sel('C')" id="C">${x.C}</div>
<div class="option" onclick="sel('D')" id="D">${x.D}</div>
`;

update();
}

function sel(v){a[i]=v;update();}

function update(){

["A","B","C","D"].forEach(x=>{
document.getElementById(x)?.classList.remove("selected");
});

if(a[i]){
document.getElementById(a[i]).classList.add("selected");
}
}

function next(){if(i<q.length-1){i++;show()}}
function prev(){if(i>0){i--;show()}}

/* finish */
function finish(){

clearInterval(timer);

let c=0;

for(let k=0;k<q.length;k++){
if(a[k]==q[k].correct)c++;
}

let users=JSON.parse(localStorage.getItem("users")||"{}");
users[name.value]=true;
localStorage.setItem("users",JSON.stringify(users));

document.getElementById("examBox").style.display="none";
document.getElementById("resultBox").style.display="block";

/* فقط پیام */
resultBox.innerHTML=`
<h2>آزمون ثبت شد</h2>
<p>نام: ${name.value}</p>
<p>نتیجه در سیستم ذخیره شد.</p>
<p>از شرکت مجدد جلوگیری شد.</p>
`;

}

</script>

</body>
</html>
