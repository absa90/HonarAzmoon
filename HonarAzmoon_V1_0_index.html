<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هنرآزمون V1.0</title>
<style>
body{font-family:tahoma;background:#f2f6ff;margin:0;padding:20px}
.box{background:#fff;padding:20px;border-radius:10px;margin-bottom:15px}
input{width:100%;padding:8px;margin:5px 0}
button{padding:8px 12px;margin:4px}
.option{padding:10px;border:1px solid #ccc;border-radius:8px;margin:8px 0;cursor:pointer}
.option.selected{background:#dbeafe;border-color:#2563eb}
#nav{margin-top:15px;display:flex;flex-wrap:wrap;gap:5px}
.navbtn{min-width:35px}
.current{background:#2563eb;color:#fff}
.answered{background:#16a34a;color:#fff}
.unanswered{background:#e5e7eb}
</style>
</head>
<body>
<div class="box">
<h2>هنرآزمون V1.0</h2>
<input id="name" placeholder="نام و نام خانوادگی *">
<button onclick="startExam()">ادامه</button>
</div>

<p>این نسخه اولیه پایدار برای ادامه توسعه پروژه است.</p>
</body>
</html>
