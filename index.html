<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هنرآزمون</title>

<style>
body{font-family:tahoma;background:#f2f6ff;margin:0;padding:0}
header{background:#1e3a8a;color:white;padding:12px;text-align:center}
.container{padding:20px}
.box{background:white;padding:20px;border-radius:10px;margin-top:15px}

button{
padding:10px 15px;
background:#16a34a;
color:white;
border:none;
border-radius:5px;
margin:5px;
cursor:pointer;
}

.option{
padding:12px;
margin:10px 0;
background:#f1f5f9;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{background:#e2e8f0}
.option.selected{
background:#bfdbfe;
border:2px solid #2563eb;
}

#timer{
font-size:18px;
font-weight:bold;
color:#b91c1c;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>هنرآزمون</h2>
<p>سامانه آزمون مهارتی</p>
</header>

<div class="container">

<div class="box">
<h3>انتخاب فایل آزمون</h3>
<input type="file" id="fileInput" accept=".xlsx">
<button onclick="load()">شروع آزمون</button>
</div>

<div class="box" id="exam" style="display:none">

<div id="timer">--</div>

<h3 id="qtitle"></h3>
<div id="qbox"></div>

<button onclick="prev()">قبلی</button>
<button onclick="next()">بعدی</button>
<button onclick="finish()">پایان</button>

</div>

<div class="box" id="result" style="display:none"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let q=[];
let a=[];
let i=0;
let time=0;
let timer;

function load(){
let f=document.getElementById("fileInput").files[0];
if(!f){alert("فایل نیست");return}

let r=new FileReader();

r.onload=function(e){
let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:"array"});
let sh=wb.Sheets[wb.SheetNames[0]];
let j=XLSX.utils.sheet_to_json(sh,{header:1});

parse(j);
}

r.readAsArrayBuffer(f);
}

function parse(d){

q=[];
let examTime=30;

d.forEach(r=>{
if(!r||!r[0]||r.length<8)return;

if(r[2]==="") return;

q.push({
question:r[2],
A:r[3],
B:r[4],
C:r[5],
D:r[6],
correct:r[7]
});

if(r[8]) examTime=r[8];
});

time=examTime*60;

startTimer();

i=0;
a=[];

document.getElementById("exam").style.display="block";
show();
}

function startTimer(){
timer=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer")
.innerText=`زمان: ${m}:${s<10?"0":""}${s}`;

time--;

if(time<0){
clearInterval(timer);
finish();
}
},1000);
}

function show(){

let x=q[i];

document.getElementById("qtitle")
.innerText=`سوال ${i+1} از ${q.length}`;

document.getElementById("qbox").innerHTML=`
<p><b>${x.question}</b></p>

<div class="option" onclick="sel('A')">${x.A}</div>
<div class="option" onclick="sel('B')">${x.B}</div>
<div class="option" onclick="sel('C')">${x.C}</div>
<div class="option" onclick="sel('D')">${x.D}</div>
`;

update();
}

function sel(v){
a[i]=v;
update();
}

function update(){
document.querySelectorAll(".option").forEach(e=>{
e.classList.remove("selected");
});

if(a[i]){
document.querySelectorAll(".option")[{"A":0,"B":1,"C":2,"D":3}[a[i]]]
.classList.add("selected");
}
}

function next(){if(i<q.length-1){i++;show()}}
function prev(){if(i>0){i--;show()}}

function finish(){

clearInterval(timer);

let c=0;

for(let k=0;k<q.length;k++){
if(a[k]==q[k].correct)c++;
}

let p100=(c/q.length)*100;
let p20=(c/q.length)*20;

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h2>نتیجه</h2>
<p>درست: ${c}</p>
<p>نمره 100: ${p100.toFixed(1)}</p>
<p>نمره 20: ${p20.toFixed(1)}</p>
`;
}

</script>

</body>
</html>
