<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هنرآزمون</title>

<style>
body {font-family:Tahoma;background:#f2f6ff;margin:0;padding:0;}
header {background:#1e3a8a;color:white;padding:12px;text-align:center;}
.container{padding:20px;}
.box{background:white;padding:20px;border-radius:10px;margin-top:15px;}

button{
  padding:10px 15px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:5px;
  margin:5px;
}

/* تایمر */
#timer{
  font-size:18px;
  font-weight:bold;
  color:#b91c1c;
  margin-bottom:10px;
}

/* گزینه‌ها */
.option{
  display:flex;
  align-items:center;
  padding:12px;
  margin:10px 0;
  background:#f1f5f9;
  border-radius:10px;
  cursor:pointer;
}
.option.selected{
  background:#bfdbfe;
  border:2px solid #2563eb;
}

.radio{
  width:18px;height:18px;
  border:2px solid #333;
  border-radius:50%;
  margin-left:10px;
}

.radio.checked::after{
  content:"";
  width:10px;height:10px;
  background:#2563eb;
  border-radius:50%;
  display:block;
  margin:2px;
}
</style>
</head>

<body>

<header>
<h2>هنرآزمون</h2>
<p>سامانه آزمون مهارتی</p>
</header>

<div class="container">

<div class="box">
<h3>انتخاب فایل آزمون</h3>
<input type="file" id="fileInput" accept=".xlsx">
<button onclick="loadFile()">شروع آزمون</button>
</div>

<div class="box" id="examBox" style="display:none;">

<div id="timer">زمان: --</div>

<h3 id="qTitle"></h3>
<div id="question"></div>

<button onclick="prev()">قبلی</button>
<button onclick="next()">بعدی</button>
<button onclick="finish()">پایان آزمون</button>

</div>

<div class="box" id="resultBox" style="display:none;"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let questions=[];
let answers=[];
let current=0;

/* تایمر کل آزمون (مثلاً 30 دقیقه) */
let totalTime = 30 * 60;
let timerInterval;

function startTimer(){
timerInterval = setInterval(()=>{
  let m = Math.floor(totalTime/60);
  let s = totalTime%60;

  document.getElementById("timer").innerText =
  `زمان باقی‌مانده: ${m}:${s<10?"0":""}${s}`;

  totalTime--;

  if(totalTime < 0){
    clearInterval(timerInterval);
    finish();
  }
},1000);
}

function loadFile(){
let file=document.getElementById("fileInput").files[0];
if(!file){alert("فایل انتخاب نشده");return;}

let reader=new FileReader();

reader.onload=function(e){
let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:"array"});
let sheet=wb.Sheets[wb.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(sheet,{header:1});
parse(json);
};

reader.readAsArrayBuffer(file);
}

function parse(data){
questions=[];

data.forEach(r=>{
if(!r || !r[0] || r.length<8) return;

questions.push({
q:r[2],
A:r[3],
B:r[4],
C:r[5],
D:r[6],
correct:r[7]
});
});

answers=[];
current=0;

document.getElementById("examBox").style.display="block";
startTimer();
show();
}

function show(){
let q=questions[current];

document.getElementById("qTitle").innerText=
`سوال ${current+1} از ${questions.length}`;

document.getElementById("question").innerHTML=`
<p><b>${q.q}</b></p>

<div class="option" onclick="select('A')" id="A">${q.A}</div>
<div class="option" onclick="select('B')" id="B">${q.B}</div>
<div class="option" onclick="select('C')" id="C">${q.C}</div>
<div class="option" onclick="select('D')" id="D">${q.D}</div>
`;

update();
}

function select(a){
answers[current]=a;
update();
}

function update(){
["A","B","C","D"].forEach(x=>{
document.getElementById(x)?.classList.remove("selected");
});

if(answers[current]){
document.getElementById(answers[current]).classList.add("selected");
}
}

function next(){
if(current<questions.length-1){
current++;
show();
}
}

function prev(){
if(current>0){
current--;
show();
}
}

function finish(){

clearInterval(timerInterval);

let correct=0;

for(let i=0;i<questions.length;i++){
if(answers[i]==questions[i].correct) correct++;
}

let score100=(correct/questions.length)*100;
let score20=(correct/questions.length)*20;

document.getElementById("examBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("resultBox").innerHTML=`
<h2>نتیجه آزمون</h2>
<p>درست: ${correct}</p>
<p>نمره از 100: ${score100.toFixed(1)}</p>
<p>نمره از 20: ${score20.toFixed(1)}</p>
`;
}

</script>

</body>
</html>
