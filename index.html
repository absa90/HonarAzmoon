<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هنرآزمون</title>

<style>
body{
font-family:tahoma;
background:#f2f6ff;
margin:0;
padding:0;
}

header{
background:#1e3a8a;
color:white;
padding:10px 15px;
display:flex;
align-items:center;
gap:15px;
}

header img{
height:50px;
background:white;
border-radius:6px;
padding:3px;
}

.header-text h3{
margin:0;
}

.header-text small{
font-size:12px;
opacity:0.9;
}

.container{padding:20px}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
background:#16a34a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
}

.option{
padding:12px;
margin:10px 0;
background:#f1f5f9;
border-radius:8px;
cursor:pointer;
border:2px solid transparent;
}

.option.selected{
background:#bfdbfe;
border:2px solid #2563eb;
}

#timer{
font-weight:bold;
color:#b91c1c;
font-size:18px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<img src="https://s6.uupload.ir/files/1781891168486_wwcp.png">

<div class="header-text">
<h3>هنرآزمون</h3>
<small>سامانه آزمون مهارتی هنرستان تلاش مبارکه</small>
</div>
</header>

<div class="container">

<!-- فرم -->
<div class="box" id="formBox">
<h3>اطلاعات دانش‌آموز</h3>

<input id="name" placeholder="نام و نام خانوادگی *">
<input id="father" placeholder="نام پدر">
<input id="nid" placeholder="کد ملی">
<input id="grade" placeholder="پایه">
<input id="field" placeholder="رشته">

<button onclick="startExam()">ادامه</button>
</div>

<!-- فایل -->
<div class="box" id="fileBox" style="display:none">
<h3>انتخاب فایل آزمون</h3>
<input type="file" id="fileInput" accept=".xlsx">
<button onclick="loadExam()">شروع آزمون</button>
</div>

<!-- آزمون -->
<div class="box" id="examBox" style="display:none">

<div id="timer">--</div>

<h3 id="title"></h3>
<div id="qbox"></div>

<button onclick="prev()">قبلی</button>
<button onclick="next()">بعدی</button>
<button onclick="finish()">پایان</button>

</div>

<!-- نتیجه -->
<div class="box" id="resultBox" style="display:none"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let q=[],a=[],i=0,time=0,timer;

/* شروع */
function startExam(){

let nameVal=document.getElementById("name").value;

if(!nameVal){
alert("نام الزامی است");
return;
}

document.getElementById("formBox").style.display="none";
document.getElementById("fileBox").style.display="block";
}

/* load */
function loadExam(){

let f=document.getElementById("fileInput").files[0];
if(!f)return;

let r=new FileReader();

r.onload=function(e){

let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:"array"});
let sh=wb.Sheets[wb.SheetNames[0]];
let j=XLSX.utils.sheet_to_json(sh,{header:1});

parse(j);
};

r.readAsArrayBuffer(f);
}

/* parse */
function parse(d){

q=[];
let examTime=30;

d.forEach(r=>{
if(!r || !r[0] || r.length<8)return;

q.push({
q:r[2],
A:r[3],
B:r[4],
C:r[5],
D:r[6],
correct:r[7]
});

if(r[8]) examTime=r[8];
});

time=examTime*60;
startTimer();

i=0;
a=[];

fileBox.style.display="none";
examBox.style.display="block";

show();
}

/* timer */
function startTimer(){

timer=setInterval(()=>{

let m=Math.floor(time/60);
let s=time%60;

timerDiv.innerText=`زمان: ${m}:${s<10?"0":""}${s}`;

time--;

if(time<0)finish();

},1000);
}

/* show */
function show(){

let x=q[i];

title.innerText=`سوال ${i+1} از ${q.length}`;

qbox.innerHTML=`
<p><b>${x.q}</b></p>

<div class="option" onclick="sel('A')">${x.A}</div>
<div class="option" onclick="sel('B')">${x.B}</div>
<div class="option" onclick="sel('C')">${x.C}</div>
<div class="option" onclick="sel('D')">${x.D}</div>
`;

update();
}

function sel(v){a[i]=v;update();}

function update(){

document.querySelectorAll(".option").forEach(e=>{
e.classList.remove("selected");
});

if(a[i]){
document.querySelectorAll(".option")[{"A":0,"B":1,"C":2,"D":3}[a[i]]]
.classList.add("selected");
}
}

function next(){if(i<q.length-1){i++;show()}}
function prev(){if(i>0){i--;show()}}

/* finish */
function finish(){

clearInterval(timer);

let c=0;

for(let k=0;k<q.length;k++){
if(a[k]==q[k].correct)c++;
}

document.getElementById("examBox").style.display="none";
document.getElementById("resultBox").style.display="block";

/* بدون نمره (طبق خواسته تو) */
resultBox.innerHTML=`
<h2>آزمون ثبت شد</h2>
<p>نام: ${document.getElementById("name").value}</p>
<p>پاسخ‌ها ذخیره شد.</p>
<p>برای چاپ از دکمه Print استفاده کنید.</p>

<button onclick="window.print()">چاپ PDF</button>
`;

}

</script>

</body>
  </html>
